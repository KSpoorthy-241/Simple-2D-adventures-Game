
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>No Touch Zone Game - Home</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1f1c2c, #928dab);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 30px;
      text-shadow: 2px 2px 5px rgba(0,0,0,0.5);
    }

    button {
      padding: 15px 40px;
      font-size: 22px;
      font-weight: bold;
      background: #ff416c;  /* fallback */
      background: linear-gradient(to right, #ff4b2b, #ff416c);
      border: none;
      border-radius: 50px;
      color: white;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
      transition: all 0.3s ease;
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
    }

    .tagline {
      margin-top: 10px;
      font-size: 18px;
      color: #f0f0f0;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <h1>No Touch Zone</h1>
  <p class="tagline">Dodge everything. Survive as long as you can!</p>
  <button onclick="window.location.href='index2.html'">🚀 Start Game</button>
</body>
</html>
